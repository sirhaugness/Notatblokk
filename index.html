<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#141414">
  <title>Thors kjappe notater</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-row">
        <h1>Thors notatblokk</h1>
        <span class="note-count" id="noteCount">0</span>
      </div>
    </header>

    <form class="note-form" id="noteForm">
      <textarea
        id="noteInput"
        placeholder="Nytt notat..."
        rows="2"
        autofocus
      ></textarea>
      <button type="submit" class="btn btn-primary btn-add">Legg til</button>
    </form>

    <section class="notes-section">
      <ul class="notes-list" id="notesList"></ul>
      <p class="empty-state" id="emptyState">Ingen notater ennå</p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
